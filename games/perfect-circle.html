<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Circle | Bored Waiting?</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        canvas {
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: crosshair;
            touch-action: none;
            max-width: 100%;
        }
        .result-container {
            display: none;
            text-align: center;
        }
        .result-container.show {
            display: block;
        }
        .rating-text {
            font-size: 1.2rem;
            color: #ccc;
            margin-top: 10px;
        }
        .canvas-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .canvas-container.hide {
            display: none;
        }
        .best-score {
            font-size: 0.85rem;
            color: #666;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="game-page">
        <div class="game-header">
            <a href="../index.html" class="back-link">← Back</a>
            <span class="game-title">⭕ Perfect Circle</span>
            <span></span>
        </div>
        <div class="game-content">
            <div class="canvas-container" id="canvasArea">
                <p class="instructions">Draw a circle with your mouse or finger. Try to make it as perfect as possible!</p>
                <canvas id="canvas" width="500" height="500"></canvas>
                <p style="color: #555; font-size: 0.85rem;">Click/tap and drag to draw</p>
            </div>

            <div class="result-container" id="resultArea">
                <p class="score-label">Your circle is</p>
                <div class="score-display" id="scoreValue" style="background: linear-gradient(135deg, #FF6B6B, #4ECDC4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">0%</div>
                <p class="rating-text" id="ratingText"></p>
                <p class="best-score" id="bestScore"></p>
                <div style="margin-top: 30px; display: flex; gap: 12px; justify-content: center;">
                    <button class="btn btn-primary" onclick="tryAgain()">Try Again</button>
                    <a href="../index.html" class="btn btn-secondary">More Games</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let points = [];
        let bestScore = parseFloat(localStorage.getItem('perfectCircleBest') || '0');

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            if (e.touches) {
                return {
                    x: (e.touches[0].clientX - rect.left) * scaleX,
                    y: (e.touches[0].clientY - rect.top) * scaleY
                };
            }
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        function startDraw(e) {
            e.preventDefault();
            drawing = true;
            points = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const pos = getPos(e);
            points.push(pos);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.strokeStyle = '#FF6B6B';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const pos = getPos(e);
            points.push(pos);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function endDraw(e) {
            if (!drawing) return;
            e.preventDefault();
            drawing = false;
            if (points.length < 20) return;
            evaluateCircle();
        }

        function evaluateCircle() {
            // Find center (centroid)
            let cx = 0, cy = 0;
            for (const p of points) {
                cx += p.x;
                cy += p.y;
            }
            cx /= points.length;
            cy /= points.length;

            // Find average radius
            let distances = points.map(p => Math.sqrt((p.x - cx) ** 2 + (p.y - cy) ** 2));
            let avgRadius = distances.reduce((a, b) => a + b, 0) / distances.length;

            if (avgRadius < 20) return;

            // Calculate deviation from perfect circle
            let totalDeviation = 0;
            for (const d of distances) {
                totalDeviation += Math.abs(d - avgRadius) / avgRadius;
            }
            let avgDeviation = totalDeviation / distances.length;

            // Check closure (start point near end point)
            const startEnd = Math.sqrt(
                (points[0].x - points[points.length - 1].x) ** 2 +
                (points[0].y - points[points.length - 1].y) ** 2
            );
            let closurePenalty = Math.min(startEnd / avgRadius, 1) * 0.15;

            // Score calculation
            let score = Math.max(0, (1 - avgDeviation * 3 - closurePenalty)) * 100;
            score = Math.round(score * 10) / 10;

            // Draw reference circle
            ctx.beginPath();
            ctx.arc(cx, cy, avgRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(78, 205, 196, 0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 8]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Update best score
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('perfectCircleBest', bestScore.toString());
            }

            showResult(score);
        }

        function showResult(score) {
            document.getElementById('canvasArea').classList.add('hide');
            const resultArea = document.getElementById('resultArea');
            resultArea.classList.add('show');

            document.getElementById('scoreValue').textContent = score + '%';

            let rating;
            if (score >= 95) rating = "🤯 Inhuman! Are you a compass?";
            else if (score >= 85) rating = "🎯 Incredible! Almost perfect!";
            else if (score >= 70) rating = "😎 Pretty solid circle skills!";
            else if (score >= 50) rating = "🙂 Not bad, keep practicing!";
            else if (score >= 30) rating = "😅 It's... a shape. Technically.";
            else rating = "🥔 That's a potato, not a circle.";

            document.getElementById('ratingText').textContent = rating;
            document.getElementById('bestScore').textContent = `Personal best: ${bestScore}%`;
        }

        function tryAgain() {
            document.getElementById('canvasArea').classList.remove('hide');
            document.getElementById('resultArea').classList.remove('show');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            points = [];
        }

        // Mouse events
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseleave', endDraw);

        // Touch events
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', endDraw);
    </script>
</body>
</html>
