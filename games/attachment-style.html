<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attachment Style | Bored Waiting?</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .quiz-container {
            max-width: 550px;
            width: 100%;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            margin-bottom: 40px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ECDC4, #44b8b0);
            border-radius: 2px;
            transition: width 0.4s ease;
        }
        .question-num {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 12px;
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px 20px;
            color: #ccc;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            line-height: 1.4;
        }
        .option-btn:hover {
            background: rgba(78, 205, 196, 0.1);
            border-color: rgba(78, 205, 196, 0.3);
            color: #fff;
        }
        .result-card {
            display: none;
            text-align: center;
        }
        .result-card.show {
            display: block;
        }
        .result-type {
            font-size: 2rem;
            font-weight: 800;
            margin: 16px 0;
            background: linear-gradient(135deg, #4ECDC4, #44b8b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .result-emoji {
            font-size: 4rem;
        }
        .result-desc {
            color: #999;
            font-size: 0.95rem;
            line-height: 1.7;
            max-width: 450px;
            margin: 0 auto 30px;
        }
        .trait-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .trait-label {
            font-size: 0.82rem;
            color: #888;
            width: 90px;
            text-align: right;
        }
        .trait-track {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            overflow: hidden;
        }
        .trait-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.8s ease;
        }
        .traits-section {
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="game-page">
        <div class="game-header">
            <a href="../index.html" class="back-link">← Back</a>
            <span class="game-title">💕 Attachment Style</span>
            <span></span>
        </div>
        <div class="game-content">
            <div class="quiz-container" id="quizArea">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div id="questionContainer">
                    <p class="question-num" id="questionNum"></p>
                    <p class="question-text" id="questionText"></p>
                    <div class="options" id="optionsContainer"></div>
                </div>
            </div>

            <div class="result-card" id="resultCard">
                <div class="result-emoji" id="resultEmoji"></div>
                <div class="result-type" id="resultType"></div>
                <p class="result-desc" id="resultDesc"></p>
                <div class="traits-section" id="traitsSection"></div>
                <div style="display: flex; gap: 12px; justify-content: center; margin-top: 20px;">
                    <button class="btn btn-primary" onclick="restart()" style="background: linear-gradient(135deg, #4ECDC4, #44b8b0);">Retake Quiz</button>
                    <a href="../index.html" class="btn btn-secondary">More Games</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                text: "Your friend hasn't replied to your text in 3 hours. What's your first thought?",
                options: [
                    { text: "They're probably busy. I'll hear back later.", scores: { secure: 3, anxious: 0, avoidant: 1, fearful: 0 } },
                    { text: "Did I say something wrong? Let me re-read my message 47 times.", scores: { secure: 0, anxious: 3, avoidant: 0, fearful: 1 } },
                    { text: "Whatever, I don't need to text people anyway.", scores: { secure: 0, anxious: 0, avoidant: 3, fearful: 1 } },
                    { text: "They hate me now. But also I don't care. But also please reply.", scores: { secure: 0, anxious: 1, avoidant: 1, fearful: 3 } }
                ]
            },
            {
                text: "Someone you're dating wants to introduce you to their friends. You feel...",
                options: [
                    { text: "Great! I love meeting new people who are important to them.", scores: { secure: 3, anxious: 1, avoidant: 0, fearful: 0 } },
                    { text: "Excited but nervous — what if their friends don't like me?", scores: { secure: 0, anxious: 3, avoidant: 0, fearful: 1 } },
                    { text: "That feels like a lot. Can we just hang out, the two of us?", scores: { secure: 0, anxious: 0, avoidant: 3, fearful: 1 } },
                    { text: "I want to go but I'll probably find an excuse to cancel last minute.", scores: { secure: 0, anxious: 1, avoidant: 1, fearful: 3 } }
                ]
            },
            {
                text: "After a disagreement, how do you usually handle things?",
                options: [
                    { text: "Talk it through calmly and try to understand the other side.", scores: { secure: 3, anxious: 0, avoidant: 0, fearful: 0 } },
                    { text: "Apologize immediately even if it wasn't my fault — I can't handle tension.", scores: { secure: 0, anxious: 3, avoidant: 0, fearful: 1 } },
                    { text: "I need space. I'll come back when I've processed everything on my own.", scores: { secure: 0, anxious: 0, avoidant: 3, fearful: 0 } },
                    { text: "Shut down completely and push them away, then regret it later.", scores: { secure: 0, anxious: 0, avoidant: 1, fearful: 3 } }
                ]
            },
            {
                text: "How do you feel about sharing your deepest feelings with someone?",
                options: [
                    { text: "Comfortable, if I trust the person. Vulnerability is healthy.", scores: { secure: 3, anxious: 1, avoidant: 0, fearful: 0 } },
                    { text: "I overshare and then panic about being too much.", scores: { secure: 0, anxious: 3, avoidant: 0, fearful: 1 } },
                    { text: "I keep things to myself. No one really needs to know all that.", scores: { secure: 0, anxious: 0, avoidant: 3, fearful: 0 } },
                    { text: "I want to open up but I'm terrified of being hurt if I do.", scores: { secure: 0, anxious: 0, avoidant: 1, fearful: 3 } }
                ]
            },
            {
                text: "A close person starts spending more time with someone else. You...",
                options: [
                    { text: "Happy for them! I have my own life too.", scores: { secure: 3, anxious: 0, avoidant: 1, fearful: 0 } },
                    { text: "Feel threatened and need constant reassurance that I still matter.", scores: { secure: 0, anxious: 3, avoidant: 0, fearful: 1 } },
                    { text: "Good, less pressure on me to be available all the time.", scores: { secure: 0, anxious: 0, avoidant: 3, fearful: 0 } },
                    { text: "Pretend I don't care while spiraling internally.", scores: { secure: 0, anxious: 1, avoidant: 1, fearful: 3 } }
                ]
            },
            {
                text: "When someone does something really nice for you unexpectedly...",
                options: [
                    { text: "I feel warm and appreciate it. I try to reciprocate!", scores: { secure: 3, anxious: 0, avoidant: 0, fearful: 0 } },
                    { text: "I love it but immediately wonder what they want in return.", scores: { secure: 0, anxious: 2, avoidant: 0, fearful: 2 } },
                    { text: "It makes me uncomfortable. I don't like owing anyone.", scores: { secure: 0, anxious: 0, avoidant: 3, fearful: 1 } },
                    { text: "I feel undeserving. Why would they be nice to me?", scores: { secure: 0, anxious: 1, avoidant: 0, fearful: 3 } }
                ]
            },
            {
                text: "Your ideal weekend with someone you care about is...",
                options: [
                    { text: "A mix of quality time together and doing our own things.", scores: { secure: 3, anxious: 0, avoidant: 1, fearful: 0 } },
                    { text: "Being together the ENTIRE time. Every. Single. Moment.", scores: { secure: 0, anxious: 3, avoidant: 0, fearful: 0 } },
                    { text: "Honestly, I'd love a weekend completely alone.", scores: { secure: 0, anxious: 0, avoidant: 3, fearful: 1 } },
                    { text: "I want to be together but I'll probably need to escape halfway through.", scores: { secure: 0, anxious: 0, avoidant: 1, fearful: 3 } }
                ]
            },
            {
                text: "When a relationship (any kind) ends, you typically...",
                options: [
                    { text: "Feel sad but know I'll be okay. I reflect on what I learned.", scores: { secure: 3, anxious: 0, avoidant: 0, fearful: 0 } },
                    { text: "Feel devastated. Replay everything. Stalk their social media for weeks.", scores: { secure: 0, anxious: 3, avoidant: 0, fearful: 1 } },
                    { text: "Move on quickly. Out of sight, out of mind.", scores: { secure: 0, anxious: 0, avoidant: 3, fearful: 0 } },
                    { text: "Alternate between 'I'm fine' and 'I will never trust anyone again.'", scores: { secure: 0, anxious: 1, avoidant: 1, fearful: 3 } }
                ]
            }
        ];

        const results = {
            secure: {
                emoji: "🌟",
                type: "Secure Attachment",
                desc: "You're emotionally balanced and comfortable with intimacy and independence. You communicate openly, trust others, and don't need constant reassurance. You're the emotional equivalent of a well-organized Tupperware drawer — impressive and rare."
            },
            anxious: {
                emoji: "🫧",
                type: "Anxious Attachment",
                desc: "You crave closeness and can be sensitive to any signs of rejection. You love deeply and intensely, sometimes at the expense of your own peace. You've definitely double-texted and then thrown your phone across the room."
            },
            avoidant: {
                emoji: "🏔️",
                type: "Avoidant Attachment",
                desc: "You value independence highly and may feel uncomfortable with too much closeness. Emotions are processed solo, thank you very much. You've told someone 'I just need space' at least 400 times in your life."
            },
            fearful: {
                emoji: "🌊",
                type: "Fearful-Avoidant (Disorganized)",
                desc: "You want deep connections but are simultaneously terrified of them. You're a walking contradiction — craving love while running from it. You've probably said 'I don't care' while very much caring."
            }
        };

        let currentQ = 0;
        let scores = { secure: 0, anxious: 0, avoidant: 0, fearful: 0 };

        function renderQuestion() {
            const q = questions[currentQ];
            document.getElementById('questionNum').textContent = `Question ${currentQ + 1} of ${questions.length}`;
            document.getElementById('questionText').textContent = q.text;
            document.getElementById('progressFill').style.width = `${(currentQ / questions.length) * 100}%`;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            // Shuffle options for variety
            const shuffled = [...q.options].sort(() => Math.random() - 0.5);
            shuffled.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.onclick = () => selectOption(opt.scores);
                container.appendChild(btn);
            });
        }

        function selectOption(optScores) {
            for (const key in optScores) {
                scores[key] += optScores[key];
            }
            currentQ++;
            if (currentQ < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quizArea').style.display = 'none';
            const card = document.getElementById('resultCard');
            card.classList.add('show');

            // Find dominant style
            let maxKey = 'secure';
            for (const key in scores) {
                if (scores[key] > scores[maxKey]) maxKey = key;
            }

            const result = results[maxKey];
            document.getElementById('resultEmoji').textContent = result.emoji;
            document.getElementById('resultType').textContent = result.type;
            document.getElementById('resultDesc').textContent = result.desc;

            // Show trait bars
            const total = Object.values(scores).reduce((a, b) => a + b, 1);
            const traitsHTML = Object.entries(scores).map(([key, val]) => {
                const pct = Math.round((val / total) * 100);
                const colors = {
                    secure: '#4ECDC4',
                    anxious: '#FF6B6B',
                    avoidant: '#FFE66D',
                    fearful: '#DDA0DD'
                };
                return `
                    <div class="trait-bar">
                        <span class="trait-label">${key.charAt(0).toUpperCase() + key.slice(1)}</span>
                        <div class="trait-track">
                            <div class="trait-fill" style="width: ${pct}%; background: ${colors[key]};"></div>
                        </div>
                        <span style="font-size: 0.8rem; color: #888; width: 35px;">${pct}%</span>
                    </div>
                `;
            }).join('');
            document.getElementById('traitsSection').innerHTML = traitsHTML;

            document.getElementById('progressFill').style.width = '100%';
        }

        function restart() {
            currentQ = 0;
            scores = { secure: 0, anxious: 0, avoidant: 0, fearful: 0 };
            document.getElementById('quizArea').style.display = 'block';
            document.getElementById('resultCard').classList.remove('show');
            renderQuestion();
        }

        renderQuestion();
    </script>
</body>
</html>
