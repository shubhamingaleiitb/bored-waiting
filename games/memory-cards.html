<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Cards | Bored Waiting?</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 420px;
            width: 100%;
        }
        .memory-card {
            aspect-ratio: 1;
            border-radius: 12px;
            cursor: pointer;
            perspective: 600px;
            user-select: none;
            -webkit-user-select: none;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease;
            transform-style: preserve-3d;
        }
        .memory-card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .memory-card.matched .card-inner {
            transform: rotateY(180deg);
        }
        .memory-card.matched {
            opacity: 0.6;
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-front {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 1.5rem;
            color: #555;
            transform: rotateY(0deg);
        }
        .card-front:hover {
            background: rgba(255,255,255,0.1);
        }
        .card-back {
            background: rgba(221, 160, 221, 0.15);
            border: 1px solid rgba(221, 160, 221, 0.3);
            font-size: 2.2rem;
            transform: rotateY(180deg);
        }
        .game-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            color: #888;
        }
        .game-stats span {
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 8px;
        }
        .timer {
            font-variant-numeric: tabular-nums;
        }
        .win-screen {
            display: none;
            text-align: center;
        }
        .win-screen.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="game-page">
        <div class="game-header">
            <a href="../index.html" class="back-link">← Back</a>
            <span class="game-title">🃏 Memory Cards</span>
            <span></span>
        </div>
        <div class="game-content">
            <div id="gameArea">
                <div class="game-stats">
                    <span>Moves: <strong id="moveCount">0</strong></span>
                    <span class="timer">⏱ <strong id="timer">0.0s</strong></span>
                    <span>Pairs: <strong id="pairsFound">0</strong>/8</span>
                </div>
                <div class="memory-grid" id="grid"></div>
            </div>

            <div class="win-screen" id="winScreen">
                <p class="score-label">You found all pairs in</p>
                <div class="score-display" id="finalTime" style="background: linear-gradient(135deg, #DDA0DD, #BB86FC); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">0s</div>
                <p class="rating-text" id="finalMoves"></p>
                <p class="rating-text" id="finalRating" style="margin-top: 8px;"></p>
                <div style="margin-top: 30px; display: flex; gap: 12px; justify-content: center;">
                    <button class="btn btn-primary" onclick="initGame()" style="background: linear-gradient(135deg, #DDA0DD, #BB86FC);">Play Again</button>
                    <a href="../index.html" class="btn btn-secondary">More Games</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const emojis = ['🐶', '🐱', '🦊', '🐼', '🐸', '🦋', '🐙', '🦄'];
        let cards = [];
        let flipped = [];
        let matched = 0;
        let moves = 0;
        let timerInterval;
        let startTime;
        let gameStarted = false;

        function initGame() {
            matched = 0;
            moves = 0;
            flipped = [];
            gameStarted = false;
            clearInterval(timerInterval);

            document.getElementById('moveCount').textContent = '0';
            document.getElementById('timer').textContent = '0.0s';
            document.getElementById('pairsFound').textContent = '0/8';
            document.getElementById('gameArea').style.display = 'block';
            document.getElementById('winScreen').classList.remove('show');

            // Create pairs and shuffle
            cards = [...emojis, ...emojis];
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cards.forEach((emoji, i) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.index = i;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back">${emoji}</div>
                    </div>
                `;
                card.addEventListener('click', () => flipCard(card, i));
                grid.appendChild(card);
            });
        }

        function flipCard(card, index) {
            if (!gameStarted) {
                gameStarted = true;
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 100);
            }

            if (flipped.length >= 2) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            flipped.push({ card, index });

            if (flipped.length === 2) {
                moves++;
                document.getElementById('moveCount').textContent = moves;

                const [a, b] = flipped;
                if (cards[a.index] === cards[b.index]) {
                    // Match!
                    setTimeout(() => {
                        a.card.classList.add('matched');
                        b.card.classList.add('matched');
                        matched++;
                        document.getElementById('pairsFound').textContent = `${matched}/8`;
                        flipped = [];

                        if (matched === 8) {
                            clearInterval(timerInterval);
                            setTimeout(showWin, 500);
                        }
                    }, 300);
                } else {
                    // No match
                    setTimeout(() => {
                        a.card.classList.remove('flipped');
                        b.card.classList.remove('flipped');
                        flipped = [];
                    }, 800);
                }
            }
        }

        function updateTimer() {
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            document.getElementById('timer').textContent = elapsed + 's';
        }

        function showWin() {
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('winScreen').classList.add('show');
            document.getElementById('finalTime').textContent = elapsed + 's';
            document.getElementById('finalMoves').textContent = `Completed in ${moves} moves`;

            let rating;
            if (moves <= 12) rating = '🧠 Photographic memory! Incredible!';
            else if (moves <= 16) rating = '🔥 Sharp memory! Very impressive!';
            else if (moves <= 22) rating = '👍 Good memory! Well done!';
            else if (moves <= 30) rating = '🙂 Not bad! Keep practicing!';
            else rating = '🤷 Maybe try with fewer cards next time?';
            document.getElementById('finalRating').textContent = rating;
        }

        initGame();
    </script>
</body>
</html>
