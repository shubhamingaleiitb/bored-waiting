<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Match | Bored Waiting?</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .color-word {
            font-size: 4rem;
            font-weight: 800;
            text-align: center;
            margin: 20px 0 10px;
            user-select: none;
            -webkit-user-select: none;
        }
        .question-prompt {
            font-size: 1rem;
            color: #888;
            text-align: center;
            margin-bottom: 30px;
        }
        .choices {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 450px;
        }
        .choice-btn {
            padding: 14px 28px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #e0e0e0;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            min-width: 110px;
        }
        .choice-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }
        .choice-btn.correct {
            background: rgba(46, 204, 113, 0.2);
            border-color: #2ecc71;
            color: #2ecc71;
        }
        .choice-btn.wrong {
            background: rgba(231, 76, 60, 0.2);
            border-color: #e74c3c;
            color: #e74c3c;
        }
        .game-hud {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #888;
        }
        .game-hud span {
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 8px;
        }
        .timer-bar {
            width: 400px;
            max-width: 90vw;
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ECDC4, #FFE66D, #FF6B6B);
            border-radius: 3px;
            transition: width 0.1s linear;
        }
        .streak-badge {
            display: inline-block;
            background: rgba(255, 230, 109, 0.15);
            color: #FFE66D;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 8px;
        }
        .feedback {
            font-size: 1.2rem;
            height: 30px;
            text-align: center;
            margin-top: 16px;
        }
        .final-screen {
            display: none;
            text-align: center;
        }
        .final-screen.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="game-page">
        <div class="game-header">
            <a href="../index.html" class="back-link">← Back</a>
            <span class="game-title">🎨 Color Match</span>
            <span></span>
        </div>
        <div class="game-content">
            <div id="gameArea">
                <div class="game-hud">
                    <span>Score: <strong id="score">0</strong></span>
                    <span id="streakContainer">Streak: <strong id="streak">0</strong></span>
                    <span>Round: <strong id="round">1</strong>/20</span>
                </div>
                <div class="timer-bar">
                    <div class="timer-fill" id="timerFill" style="width: 100%"></div>
                </div>
                <p class="question-prompt">What <strong>COLOR</strong> is the text painted in?</p>
                <div class="color-word" id="colorWord">RED</div>
                <div class="choices" id="choices"></div>
                <div class="feedback" id="feedback"></div>
            </div>

            <div class="final-screen" id="finalScreen">
                <p class="score-label">Final Score</p>
                <div class="score-display" id="finalScore" style="background: linear-gradient(135deg, #87CEEB, #4ECDC4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">0</div>
                <p class="rating-text" id="finalRating"></p>
                <p style="color: #666; font-size: 0.9rem; margin-top: 8px;" id="finalStats"></p>
                <div style="margin-top: 30px; display: flex; gap: 12px; justify-content: center;">
                    <button class="btn btn-primary" onclick="startGame()" style="background: linear-gradient(135deg, #87CEEB, #4da6c9);">Play Again</button>
                    <a href="../index.html" class="btn btn-secondary">More Games</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const colors = [
            { name: 'Red', hex: '#e74c3c' },
            { name: 'Blue', hex: '#3498db' },
            { name: 'Green', hex: '#2ecc71' },
            { name: 'Yellow', hex: '#f1c40f' },
            { name: 'Purple', hex: '#9b59b6' },
            { name: 'Orange', hex: '#e67e22' },
            { name: 'Pink', hex: '#e84393' },
            { name: 'Cyan', hex: '#00cec9' }
        ];

        let score = 0;
        let currentRound = 0;
        let streak = 0;
        let maxStreak = 0;
        let correctCount = 0;
        let totalRounds = 20;
        let timeLeft = 100;
        let timerInterval;
        let canAnswer = true;

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function pickRandom(arr, exclude) {
            let item;
            do {
                item = arr[Math.floor(Math.random() * arr.length)];
            } while (exclude && item.name === exclude.name);
            return item;
        }

        function startGame() {
            score = 0;
            currentRound = 0;
            streak = 0;
            maxStreak = 0;
            correctCount = 0;
            document.getElementById('score').textContent = '0';
            document.getElementById('streak').textContent = '0';
            document.getElementById('gameArea').style.display = 'block';
            document.getElementById('finalScreen').classList.remove('show');
            nextRound();
        }

        function nextRound() {
            currentRound++;
            if (currentRound > totalRounds) {
                showFinal();
                return;
            }

            canAnswer = true;
            document.getElementById('round').textContent = currentRound;
            document.getElementById('feedback').textContent = '';

            // Pick word and display color (different to create Stroop effect)
            const wordColor = colors[Math.floor(Math.random() * colors.length)];
            let displayColor;
            // 70% chance of mismatch for difficulty
            if (Math.random() < 0.7) {
                displayColor = pickRandom(colors, wordColor);
            } else {
                displayColor = wordColor;
            }

            const wordEl = document.getElementById('colorWord');
            wordEl.textContent = wordColor.name.toUpperCase();
            wordEl.style.color = displayColor.hex;

            // Generate choices (including the correct answer)
            let choices = [displayColor];
            while (choices.length < 4) {
                const c = colors[Math.floor(Math.random() * colors.length)];
                if (!choices.find(x => x.name === c.name)) {
                    choices.push(c);
                }
            }
            choices = shuffle(choices);

            const container = document.getElementById('choices');
            container.innerHTML = '';
            choices.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = c.name;
                btn.onclick = () => answer(btn, c.name, displayColor.name);
                container.appendChild(btn);
            });

            // Timer
            timeLeft = 100;
            clearInterval(timerInterval);
            document.getElementById('timerFill').style.width = '100%';
            timerInterval = setInterval(() => {
                timeLeft -= 2;
                document.getElementById('timerFill').style.width = Math.max(0, timeLeft) + '%';
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    canAnswer = false;
                    streak = 0;
                    document.getElementById('streak').textContent = streak;
                    document.getElementById('feedback').innerHTML = '⏰ Time\'s up!';
                    setTimeout(nextRound, 1000);
                }
            }, 100);
        }

        function answer(btn, chosen, correct) {
            if (!canAnswer) return;
            canAnswer = false;
            clearInterval(timerInterval);

            if (chosen === correct) {
                btn.classList.add('correct');
                streak++;
                correctCount++;
                const bonus = streak >= 3 ? streak : 1;
                const timeBonus = Math.ceil(timeLeft / 20);
                const points = 10 * bonus + timeBonus;
                score += points;
                if (streak > maxStreak) maxStreak = streak;
                document.getElementById('feedback').innerHTML = `✅ +${points} points` +
                    (streak >= 3 ? ` <span class="streak-badge">🔥 ${streak}x streak!</span>` : '');
            } else {
                btn.classList.add('wrong');
                // Highlight correct
                const allBtns = document.querySelectorAll('.choice-btn');
                allBtns.forEach(b => {
                    if (b.textContent === correct) b.classList.add('correct');
                });
                streak = 0;
                document.getElementById('feedback').textContent = `❌ It was ${correct}`;
            }

            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            setTimeout(nextRound, 1000);
        }

        function showFinal() {
            clearInterval(timerInterval);
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('finalScreen').classList.add('show');
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalStats').textContent = `${correctCount}/${totalRounds} correct · Best streak: ${maxStreak}`;

            let rating;
            if (score >= 400) rating = '🧠 Stroop master! Your brain is fireproof!';
            else if (score >= 250) rating = '🔥 Impressive! You barely got tricked!';
            else if (score >= 150) rating = '👍 Pretty good! Your brain fought well!';
            else if (score >= 80) rating = '🙂 The Stroop effect got you a few times!';
            else rating = '🌀 Your brain is thoroughly confused. Classic Stroop!';
            document.getElementById('finalRating').textContent = rating;
        }

        startGame();
    </script>
</body>
</html>
